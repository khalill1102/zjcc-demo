<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 紫金蝉茶模型 - 汕头大学</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(214, 175, 114, 0.16), transparent 30%),
        radial-gradient(circle at bottom, rgba(66, 94, 44, 0.22), transparent 28%),
        linear-gradient(180deg, #1b140d 0%, #0d0905 100%);
      color: #fff;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .ui-overlay {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 10;
      max-width: 360px;
      padding: 16px 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
      pointer-events: none;
    }

    .ui-overlay h2 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.3;
      color: #f7d8a3;
    }

    .ui-overlay p {
      margin: 5px 0;
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      line-height: 1.7;
    }

    .ui-tag {
      display: inline-block;
      margin-bottom: 10px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(247, 216, 163, 0.14);
      border: 1px solid rgba(247, 216, 163, 0.24);
      color: #ffe4b8;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .loading {
      position: absolute;
      right: 18px;
      top: 18px;
      z-index: 10;
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      font-size: 13px;
      color: rgba(255,255,255,0.92);
    }

    .bottom-bar {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      padding: 11px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      transition: 0.25s;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
      cursor: pointer;
      user-select: none;
    }

    .action-btn.primary {
      background: linear-gradient(135deg, #d6af72, #b9863d);
      color: #2b1808;
    }

    .action-btn.ghost {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .panel {
      position: absolute;
      right: 18px;
      bottom: 90px;
      z-index: 10;
      width: 320px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    }

    .panel h3 {
      margin: 0 0 12px;
      font-size: 16px;
      color: #f7d8a3;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .row label {
      font-size: 13px;
      color: rgba(255,255,255,0.92);
      flex: 1;
    }

    .row select,
    .row input[type="range"] {
      flex: 1;
    }

    .row input[type="checkbox"] {
      transform: scale(1.1);
    }

    .tips {
      margin-top: 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.72);
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .ui-overlay {
        top: 12px;
        left: 12px;
        right: 12px;
        max-width: none;
      }

      .loading {
        top: auto;
        bottom: 200px;
        right: 12px;
        left: 12px;
        text-align: center;
      }

      .panel {
        right: 12px;
        left: 12px;
        width: auto;
        bottom: 88px;
      }

      .bottom-bar {
        width: calc(100% - 24px);
        bottom: 12px;
      }

      .action-btn {
        flex: 1;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div class="ui-overlay">
      <div class="ui-tag">汕头大学 · 3D数字展示</div>
      <h2>3D 紫金蝉茶模型</h2>
      <p>左键旋转｜右键平移｜滚轮缩放</p>
      <p>右下角可以切换不同贴图组合，快速找出正确材质。</p>
    </div>

    <div class="loading" id="loadingText">模型加载中...</div>

    <div class="panel">
      <h3>材质调试面板</h3>

      <div class="row">
        <label for="baseMapSelect">主颜色贴图</label>
        <select id="baseMapSelect">
          <option value="shaded">shaded.png</option>
          <option value="diffuse">texture_diffuse.png</option>
          <option value="none">不用颜色贴图</option>
        </select>
      </div>

      <div class="row">
        <label for="useNormal">启用法线贴图</label>
        <input type="checkbox" id="useNormal" checked />
      </div>

      <div class="row">
        <label for="flipNormalY">法线 Y 翻转</label>
        <input type="checkbox" id="flipNormalY" />
      </div>

      <div class="row">
        <label for="useRoughness">启用粗糙度贴图</label>
        <input type="checkbox" id="useRoughness" checked />
      </div>

      <div class="row">
        <label for="useMetallic">启用金属贴图</label>
        <input type="checkbox" id="useMetallic" />
      </div>

      <div class="row">
        <label for="roughnessRange">粗糙度</label>
        <input type="range" id="roughnessRange" min="0" max="1" step="0.01" value="0.92" />
      </div>

      <div class="row">
        <label for="metalnessRange">金属度</label>
        <input type="range" id="metalnessRange" min="0" max="1" step="0.01" value="0.02" />
      </div>

      <div class="row">
        <label for="normalScaleRange">法线强度</label>
        <input type="range" id="normalScaleRange" min="0" max="3" step="0.01" value="1.0" />
      </div>

    <div class="bottom-bar">
      <a href="index.html" class="action-btn primary">返回首页</a>
      <a href="javascript:void(0)" class="action-btn ghost" id="resetViewBtn">重置视角</a>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OBJLoader } from "three/addons/loaders/OBJLoader.js";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const container = document.getElementById("canvas-container");
    const loadingText = document.getElementById("loadingText");
    const resetViewBtn = document.getElementById("resetViewBtn");

    const baseMapSelect = document.getElementById("baseMapSelect");
    const useNormal = document.getElementById("useNormal");
    const flipNormalY = document.getElementById("flipNormalY");
    const useRoughness = document.getElementById("useRoughness");
    const useMetallic = document.getElementById("useMetallic");
    const roughnessRange = document.getElementById("roughnessRange");
    const metalnessRange = document.getElementById("metalnessRange");
    const normalScaleRange = document.getElementById("normalScaleRange");

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x0d0905, 18, 42);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 3.5, 10);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.target.set(0, 1.2, 0);
    controls.update();

    resetViewBtn.addEventListener("click", () => {
      camera.position.set(0, 3.5, 10);
      controls.target.set(0, 1.2, 0);
      controls.update();
    });

    // 灯光
    scene.add(new THREE.AmbientLight(0xffffff, 1.45));

    const light1 = new THREE.DirectionalLight(0xfff3dd, 1.8);
    light1.position.set(6, 10, 8);
    scene.add(light1);

    const light2 = new THREE.DirectionalLight(0xdce8d0, 0.9);
    light2.position.set(-6, 5, 6);
    scene.add(light2);

    const light3 = new THREE.PointLight(0xffd9a3, 0.7, 40);
    light3.position.set(-4, 2, -5);
    scene.add(light3);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(10, 64),
      new THREE.MeshStandardMaterial({
        color: 0x2d2318,
        roughness: 0.95,
        metalness: 0.02
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.25;
    scene.add(ground);

    const textureLoader = new THREE.TextureLoader();
    const objLoader = new OBJLoader();

    const textures = {
      shaded: null,
      diffuse: null,
      normal: null,
      roughness: null,
      metallic: null,
      pbr: null
    };

    let modelRoot = null;
    let sharedMaterial = null;

    function loadTexture(path, isColor = false) {
      return new Promise((resolve) => {
        textureLoader.load(
          path,
          (texture) => {
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.flipY = false;
            if (isColor) {
              texture.colorSpace = THREE.SRGBColorSpace;
            }
            resolve(texture);
          },
          undefined,
          (err) => {
            console.warn("贴图加载失败:", path, err);
            resolve(null);
          }
        );
      });
    }

    function centerAndScaleObject(object, scale = 1.15) {
      const box = new THREE.Box3().setFromObject(object);
      const center = box.getCenter(new THREE.Vector3());
      object.position.sub(center);
      object.scale.setScalar(scale);
    }

    function getSelectedBaseMap() {
      if (baseMapSelect.value === "shaded") return textures.shaded;
      if (baseMapSelect.value === "diffuse") return textures.diffuse;
      return null;
    }

    function buildMaterial() {
      const material = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        map: getSelectedBaseMap(),
        normalMap: useNormal.checked ? textures.normal : null,
        roughnessMap: useRoughness.checked ? textures.roughness : null,
        metalnessMap: useMetallic.checked ? textures.metallic : null,
        roughness: parseFloat(roughnessRange.value),
        metalness: parseFloat(metalnessRange.value),
        side: THREE.DoubleSide
      });

      const scale = parseFloat(normalScaleRange.value);
      material.normalScale = new THREE.Vector2(
        scale,
        flipNormalY.checked ? -scale : scale
      );

      return material;
    }

    function applyMaterialToModel() {
      if (!modelRoot) return;

      const nextMaterial = buildMaterial();

      modelRoot.traverse((child) => {
        if (!child.isMesh) return;
        child.material = nextMaterial;
      });

      if (sharedMaterial) sharedMaterial.dispose();
      sharedMaterial = nextMaterial;
    }

    async function loadAllTextures() {
      const [
        shaded,
        diffuse,
        normal,
        roughness,
        metallic,
        pbr
      ] = await Promise.all([
        loadTexture("models/shaded.png", true),
        loadTexture("models/texture_diffuse.png", true),
        loadTexture("models/texture_normal.png"),
        loadTexture("models/texture_roughness.png"),
        loadTexture("models/texture_metallic.png"),
        loadTexture("models/texture_pbr.png")
      ]);

      textures.shaded = shaded;
      textures.diffuse = diffuse;
      textures.normal = normal;
      textures.roughness = roughness;
      textures.metallic = metallic;
      textures.pbr = pbr;
    }

    async function initModel() {
      await loadAllTextures();

      objLoader.load(
        "models/base.obj",
        (object) => {
          object.traverse((child) => {
            if (!child.isMesh) return;

            child.castShadow = true;
            child.receiveShadow = true;

            if (child.geometry) {
              child.geometry.computeVertexNormals();

              if (!child.geometry.attributes.uv) {
                console.warn("模型缺少 UV，贴图可能无法正确显示：", child);
              }
            }
          });

          centerAndScaleObject(object, 1.15);
          scene.add(object);
          modelRoot = object;

          applyMaterialToModel();

          loadingText.textContent = "模型加载完成";
          setTimeout(() => {
            loadingText.style.display = "none";
          }, 1000);
        },
        (xhr) => {
          if (xhr.total) {
            const percent = ((xhr.loaded / xhr.total) * 100).toFixed(1);
            loadingText.textContent = `模型加载中 ${percent}%`;
          }
        },
        (error) => {
          console.error("模型加载失败：", error);
          loadingText.textContent = "模型加载失败";
        }
      );
    }

    // 调试面板联动
    [
      baseMapSelect,
      useNormal,
      flipNormalY,
      useRoughness,
      useMetallic,
      roughnessRange,
      metalnessRange,
      normalScaleRange
    ].forEach((el) => {
      el.addEventListener("input", applyMaterialToModel);
      el.addEventListener("change", applyMaterialToModel);
    });

    // 背景粒子
    const particlesGeometry = new THREE.BufferGeometry();
    const particlesCount = 300;
    const positions = new Float32Array(particlesCount * 3);

    for (let i = 0; i < particlesCount * 3; i += 3) {
      positions[i] = (Math.random() - 0.5) * 30;
      positions[i + 1] = Math.random() * 12 - 2;
      positions[i + 2] = (Math.random() - 0.5) * 30;
    }

    particlesGeometry.setAttribute(
      "position",
      new THREE.BufferAttribute(positions, 3)
    );

    const particlesMaterial = new THREE.PointsMaterial({
      color: 0xd6b37a,
      size: 0.05,
      transparent: true,
      opacity: 0.85
    });

    const particles = new THREE.Points(particlesGeometry, particlesMaterial);
    scene.add(particles);

    function animate() {
      requestAnimationFrame(animate);
      particles.rotation.y += 0.0008;
      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    initModel();
    animate();
  </script>
</body>
</html>
